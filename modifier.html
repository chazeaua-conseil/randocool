<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Aventure | Randocool</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60; --dark: #0f172a; --grey: #64748b;
            --bg-light: #f1f5f9; --white: #ffffff; --border: #e2e8f0;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); margin: 0; padding-top: 100px; }

        header {
            position: fixed; top: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); z-index: 2000; border-bottom: 1px solid rgba(0,0,0,0.05);
            height: 80px; display: flex; align-items: center; padding: 0 40px; justify-content: space-between;
        }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--dark); }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .edit-card { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.75rem; font-weight: 800; color: var(--grey); text-transform: uppercase; }
        input, textarea { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; background: #f8fafc; }
        
        /* Liste des participants style Admin */
        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 30px 0 15px 0; letter-spacing: 1px; }
        .participants-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .participant-row {
            display: flex; align-items: center; padding: 10px 15px;
            background: #f8fafc; border-radius: 18px; border: 2px solid transparent;
            cursor: pointer; transition: 0.2s;
        }
        .participant-row.active { background: #ecfdf5; border-color: var(--primary); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        .p-info { flex: 1; }
        .p-name { display: block; font-size: 0.85rem; font-weight: 700; }
        .toggle-pm { 
            background: white; padding: 4px 10px; border-radius: 15px; border: 1px solid var(--border);
            font-size: 0.6rem; font-weight: 800; display: flex; align-items: center; gap: 4px;
        }
        .participant-row.active .toggle-pm { border-color: var(--primary); color: var(--primary); }

        .btn-save { 
            width: 100%; padding: 18px; background: var(--dark); color: white; 
            border: none; border-radius: 18px; font-weight: 800; font-size: 1rem;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }
        .btn-save:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-save:disabled { background: var(--grey); cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Randocool Admin</a>
    <a href="archives.html" style="text-decoration: none; font-weight: 700; color: var(--grey); font-size: 0.9rem;">← Retour</a>
</header>

<div class="container">
    <div class="edit-card">
        <h2 id="page-title">Modifier l'aventure</h2>
        <form id="main-form">
            <div class="section-title">Parcours</div>
            <div class="form-grid">
                <div class="field full"><label>Titre</label><input type="text" id="titre" required></div>
                <div class="field"><label>Date</label><input type="date" id="date" required></div>
                <div class="field"><label>Dénivelé (m)</label><input type="number" id="denivele"></div>
                <div class="field"><label>Distance (km)</label><input type="number" step="0.1" id="distance" required></div>
                <div class="field"><label>Distance Petite Marche (km)</label><input type="number" step="0.1" id="small_distance"></div>
                <div class="field full"><label>Description</label><textarea id="description" rows="3"></textarea></div>
            </div>

            <div class="section-title">Médias</div>
            <div class="form-grid">
                <div class="field full"><label>URL Image</label><input type="url" id="image_url"></div>
                <div class="field full"><label>Lien Album</label><input type="url" id="album_url"></div>
            </div>

            <div class="section-title">Équipe présente (Cliquer pour sélectionner)</div>
            <div id="participants-list" class="participants-list">
                </div>

            <button type="submit" id="submit-btn" class="btn-save">ENREGISTRER LES MODIFICATIONS</button>
        </form>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://mdpzwevznroqkpnobbag.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcHp3ZXZ6bnJvcWtwbm9iYmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3OTM1MjEsImV4cCI6MjA4NDM2OTUyMX0.ISXEl1Lf-jKMW1BUKnu02wcjs1veZ9Os9kmJcJCmwG4';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const marcheId = urlParams.get('id');

    let initialParticipations = []; // Pour comparer les changements

    async function loadData() {
        if (!marcheId) return alert("ID manquant");

        // 1. Charger la rando
        const { data: rando } = await supabaseClient.from('randos').select('*').eq('id', marcheId).single();
        
        // 2. Charger les participations actuelles
        const { data: parts } = await supabaseClient.from('participations').select('membre_id, a_fait_petit_parcours').eq('marche_id', marcheId);
        initialParticipations = parts || [];

        // 3. Charger tous les membres
        const { data: membres } = await supabaseClient.from('randocooleurs').select('*').order('nom');

        // Remplir le formulaire
        document.getElementById('titre').value = rando.titre;
        document.getElementById('date').value = rando.date;
        document.getElementById('distance').value = rando.distance;
        document.getElementById('small_distance').value = rando.small_distance || 0;
        document.getElementById('denivele').value = rando.denivele;
        document.getElementById('description').value = rando.description || "";
        document.getElementById('image_url').value = rando.image_url;
        document.getElementById('album_url').value = rando.album_url;

        // Générer la liste des participants
        const list = document.getElementById('participants-list');
        list.innerHTML = membres.map(m => {
            const p = initialParticipations.find(ip => ip.membre_id == m.id);
            const isPresent = !!p;
            const isSmall = p ? p.a_fait_petit_parcours : false;

            return `
                <div class="participant-row ${isPresent ? 'active' : ''}" onclick="toggleRow(this)">
                    <input type="checkbox" class="is-present" data-id="${m.id}" ${isPresent ? 'checked' : ''} style="display:none">
                    <img src="${m.photo_url || 'https://ui-avatars.com/api/?name='+m.nom}" class="avatar">
                    <div class="p-info">
                        <span class="p-name">${m.nom}</span>
                    </div>
                    <div class="toggle-pm" onclick="event.stopPropagation()">
                        <input type="checkbox" class="is-small" data-id="${m.id}" ${isSmall ? 'checked' : ''}> PM
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleRow(row) {
        const cb = row.querySelector('.is-present');
        cb.checked = !cb.checked;
        row.classList.toggle('active', cb.checked);
    }

    document.getElementById('main-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Mise à jour des compteurs...";

        const distNorm = parseFloat(document.getElementById('distance').value);
        const distSmall = parseFloat(document.getElementById('small_distance').value || 0);

        // --- PHASE 1 : Mise à jour de la table "randos" ---
        const { error: randoErr } = await supabaseClient.from('randos').update({
            titre: document.getElementById('titre').value,
            date: document.getElementById('date').value,
            distance: distNorm,
            small_distance: distSmall,
            denivele: parseInt(document.getElementById('denivele').value || 0),
            description: document.getElementById('description').value,
            image_url: document.getElementById('image_url').value,
            album_url: document.getElementById('album_url').value,
            nombre_participants: document.querySelectorAll('.is-present:checked').length
        }).eq('id', marcheId);

        // --- PHASE 2 : Gestion des participations et KM ---
        const currentPresents = Array.from(document.querySelectorAll('.is-present:checked')).map(cb => ({
            id: cb.dataset.id,
            isSmall: document.querySelector(`.is-small[data-id="${cb.dataset.id}"]`).checked
        }));

        // A. Supprimer ceux qui ne sont plus cochés (Décrémenter KM)
        for (const old of initialParticipations) {
            if (!currentPresents.find(cp => cp.id == old.membre_id)) {
                const loss = old.a_fait_petit_parcours ? distSmall : distNorm;
                await updateKm(old.membre_id, -loss);
                await supabaseClient.from('participations').delete().eq('marche_id', marcheId).eq('membre_id', old.membre_id);
            }
        }

        // B. Ajouter ou Modifier les participants cochés
        for (const current of currentPresents) {
            const old = initialParticipations.find(ip => ip.membre_id == current.id);

            if (!old) {
                // Nouveau participant : Ajouter KM
                const gain = current.isSmall ? distSmall : distNorm;
                await updateKm(current.id, gain);
                await supabaseClient.from('participations').insert([{ marche_id: marcheId, membre_id: current.id, a_fait_petit_parcours: current.isSmall }]);
            } 
            else if (old.a_fait_petit_parcours !== current.isSmall) {
                // Changement de type PM/Norm : Ajuster KM
                const loss = old.a_fait_petit_parcours ? distSmall : distNorm;
                const gain = current.isSmall ? distSmall : distNorm;
                await updateKm(current.id, gain - loss);
                await supabaseClient.from('participations').update({ a_fait_petit_parcours: current.isSmall }).eq('marche_id', marcheId).eq('membre_id', current.id);
            }
        }

        window.location.href = "archives.html";
    });

    async function updateKm(membreId, delta) {
        const { data } = await supabaseClient.from('randocooleurs').select('km').eq('id', membreId).single();
        const nouveauTotal = (parseFloat(data.km) || 0) + delta;
        await supabaseClient.from('randocooleurs').update({ km: nouveauTotal }).eq('id', membreId);
    }

    loadData();
</script>
</body>
</html>
