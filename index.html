<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randocool | L'aventure au sommet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60; 
            --dark: #0f172a; 
            --slate: #1e293b;
            --grey: #64748b;
            --white: #ffffff; 
            --bg-light: #f1f5f9;
            --border: #e2e8f0;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--white); color: var(--dark); margin: 0; padding-top: 80px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            z-index: 3000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; height: 80px; max-width: 1400px; margin: 0 auto;
        }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase; }
        .logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1.5px; text-decoration: none; color: var(--dark); position: absolute; left: 50%; transform: translateX(-50%); }
        .btn-add-rando { background: var(--dark); color: white !important; padding: 12px 24px; border-radius: 14px; font-size: 0.75rem !important; font-weight: 700; text-decoration: none; transition: 0.3s; }
        .btn-add-rando:hover { background: var(--primary); }

        /* SECTION HERO */
        .hero-section { background-color: var(--bg-light); padding: 40px 0; }
        .hero-container { max-width: 1300px; margin: 0 auto; padding: 0 20px; position: relative; }

        .slider-wrapper { 
            border-radius: 40px; 
            overflow: hidden; 
            background: var(--white); 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.15);
            height: 650px;
        }

        .slide { display: none; flex-direction: column; height: 100%; }
        .slide.active { display: flex; }

        .hero-header-block { padding: 25px 50px; background: var(--primary); color: var(--white); flex-shrink: 0; }
        .hero-title { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }

        .hero-main-content {
            display: grid; grid-template-columns: 380px 1fr;
            background: var(--white); flex-grow: 1; height: calc(100% - 90px);
        }

        /* BLOC RÉSUMÉ */
        .hero-info-side { padding: 40px; border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; overflow: hidden; }
        .scroll-container { overflow-y: auto; flex-grow: 1; padding-right: 15px; }
        .scroll-container::-webkit-scrollbar { width: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .hero-summary { font-size: 0.9rem; color: var(--grey); line-height: 1.8; font-weight: 400; margin: 0; }

        /* IMAGE ET BOUTON ALBUM (FORCE DISPLAY) */
        .hero-image-side { position: relative; height: 100%; background: #000; }
        .hero-image-side img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .btn-album-overlay {
            position: absolute; 
            bottom: 30px !important; 
            right: 30px !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            background: #ffffff !important; 
            color: var(--dark) !important;
            padding: 18px 32px !important; 
            border-radius: 20px !important; 
            text-decoration: none !important;
            font-weight: 800 !important; 
            font-size: 0.9rem !important; 
            z-index: 9999 !important; /* Force le premier plan */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4) !important; 
            transition: all 0.3s ease;
            border: 2px solid var(--primary) !important;
        }
        .btn-album-overlay:hover { background: var(--primary) !important; color: white !important; transform: translateY(-5px); }

        .badge-overlay-container { position: absolute; top: 30px; left: 30px; display: flex; gap: 10px; z-index: 500; }
        .overlay-badge { background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; color: var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .overlay-badge span { color: var(--primary); }

        /* CALENDRIER */
        .date-badge {
            position: absolute; top: 30px; right: 30px; background: white;
            border-radius: 15px; width: 60px; text-align: center; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 500;
        }
        .m-bg { background: var(--primary); color: white; font-size: 0.65rem; font-weight: 800; padding: 5px 0; text-transform: uppercase; }
        .d-num { font-size: 1.3rem; font-weight: 800; padding: 6px 0; color: var(--dark); }

        /* NAVIGATION */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 55px; height: 55px; border-radius: 50%; background: var(--white); border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn:hover { background: var(--primary); color: white; }
        .prev { left: -25px; } .next { right: -25px; }

        /* ACTUALITÉS */
        .news-section { padding: 60px 0; background: var(--white); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .actus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .actu-card { background: var(--bg-light); border-radius: 30px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .actu-img-wrapper { position: relative; width: 100%; height: 220px; }
        .actu-img { width: 100%; height: 100%; object-fit: cover; }
        .actu-card .date-badge { position: absolute; top: 15px; right: 15px; width: 50px; border-radius: 12px; }
        .actu-card .m-bg { font-size: 0.55rem; padding: 4px 0; }
        .actu-card .d-num { font-size: 1.1rem; padding: 5px 0; }
        .actu-body { padding: 25px; }

        @media (max-width: 1100px) {
            .slider-wrapper { height: auto; }
            .hero-main-content { grid-template-columns: 1fr; }
            .hero-info-side { height: 250px; border-right: none; }
            .hero-image-side { height: 400px; }
            .logo { position: static; transform: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="nav-links">
            <a href="index.html" style="color: var(--primary);">ACCUEIL</a>
            <a href="archives.html">ARCHIVES</a>
            <a href="modifier_equipe.html">L'ÉQUIPE</a>
            <a href="dico.html">DICTIONNAIRE</a>
            <a href="genese.html">GENÈSE</a>
        </div>
        <a href="index.html" class="logo">Randocool</a>
        <a href="#" class="btn-add-rando">+ RANDO</a>
    </div>
</header>

<section class="hero-section">
    <div class="hero-container">
        <button class="nav-btn prev" onclick="moveSlide(-1)">←</button>
        <button class="nav-btn next" onclick="moveSlide(1)">→</button>
        <div class="slider-wrapper">
            <div id="slider-root"></div>
        </div>
    </div>
</section>

<section class="news-section">
    <div class="container">
        <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px;">Fil d'actualité</h2>
        <div id="actus-root" class="actus-grid"></div>
    </div>
</section>

<script>
    const SUPABASE_URL = 'https://mdpzwevznroqkpnobbag.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcHp3ZXZ6bnJvcWtwbm9iYmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3OTM1MjEsImV4cCI6MjA4NDM2OTUyMX0.ISXEl1Lf-jKMW1BUKnu02wcjs1veZ9Os9kmJcJCmwG4';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentIdx = 0;

    async function init() {
        const { data: randos } = await supabaseClient.from('randos').select('*').order('date', { ascending: false }).limit(5);
        if (randos) renderHero(randos);

        const { data: actus } = await supabaseClient.from('actus').select('*').order('created_at', { ascending: false });
        if (actus) renderActus(actus);
    }

    function renderHero(items) {
        document.getElementById('slider-root').innerHTML = items.map((r, i) => {
            const d = new Date(r.date);
            return `
            <div class="slide ${i === 0 ? 'active' : ''}">
                <div class="hero-header-block"><h2 class="hero-title">${r.titre}</h2></div>
                <div class="hero-main-content">
                    <div class="hero-info-side">
                        <div class="scroll-container">
                            <p class="hero-summary">${r.description || 'Une magnifique randonnée Randocool.'}</p>
                        </div>
                    </div>
                    <div class="hero-image-side">
                        <img src="${r.image_url}" alt="${r.titre}">
                        
                        <div class="badge-overlay-container">
                            <div class="overlay-badge"><span>📏</span> ${r.distance} KM</div>
                            <div class="overlay-badge"><span>📈</span> ${r.denivele} M</div>
                            <div class="overlay-badge"><span>👥</span> ${r.nombre_participants || 0}</div>
                        </div>

                        <div class="date-badge">
                            <div class="m-bg">${d.toLocaleDateString('fr-FR', {month:'short'})}</div>
                            <div class="d-num">${d.getDate()}</div>
                        </div>

                        <a href="${r.album_url}" target="_blank" class="btn-album-overlay">VOIR L'ALBUM 📸</a>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderActus(items) {
        document.getElementById('actus-root').innerHTML = items.map(a => {
            const d = new Date(a.created_at);
            return `
            <div class="actu-card">
                <div class="actu-img-wrapper">
                    ${a.photo_url ? `<img src="${a.photo_url}" class="actu-img">` : '<div class="actu-img" style="background:#ddd"></div>'}
                    <div class="date-badge">
                        <div class="m-bg">${d.toLocaleDateString('fr-FR', {month:'short'})}</div>
                        <div class="d-num">${d.getDate()}</div>
                    </div>
                </div>
                <div class="actu-body">
                    <p style="font-weight:400; font-size:0.88rem; color:var(--slate); margin:0;">${a.description}</p>
                </div>
            </div>`;
        }).join('');
    }

    function moveSlide(dir) {
        const slides = document.querySelectorAll('.slide');
        if(!slides.length) return;
        slides[currentIdx].classList.remove('active');
        currentIdx = (currentIdx + dir + slides.length) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    init();
</script>
</body>
</html>
