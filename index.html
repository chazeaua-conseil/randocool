<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randocool | L'aventure au sommet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60; 
            --primary-light: #f0fdf4; /* Vert subtil pour le bloc texte */
            --dark: #0f172a; 
            --grey: #475569;
            --white: #ffffff; 
            --border: #e2e8f0;
            --bg-page: #f8fafc;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--white); color: var(--dark); margin: 0; padding-top: 80px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-container {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            padding: 0 40px; height: 80px; width: 100%; box-sizing: border-box;
        }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; }
        .logo { font-weight: 800; font-size: 1.8rem; letter-spacing: -1.5px; text-decoration: none; color: var(--dark); text-align: center; }
        .nav-actions { display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
        .btn-add-main { background: var(--dark); color: white !important; padding: 10px 20px; border-radius: 12px; font-size: 0.8rem !important; font-weight: 700; text-decoration: none; }

        /* SECTION HERO (CARROUSEL) */
        .hero-section { background-color: var(--bg-page); padding: 60px 0; }
        .hero-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }

        .slider-wrapper { 
            position: relative; 
            border-radius: 40px; 
            overflow: hidden; 
            background: var(--white); 
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1);
        }

        /* GRILLE STRICTE : TEXTE / IMAGE */
        .slide { 
            display: none; 
            grid-template-columns: 400px 1fr; /* Largeur fixe pour le texte, le reste pour l'image */
            background: var(--white);
            align-items: stretch;
        }
        .slide.active { display: grid; }

        /* COLONNE GAUCHE (TEXTE) */
        .hero-info-side {
            padding: 40px;
            background: var(--primary-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .pill { 
            background: var(--white); color: var(--primary); 
            padding: 6px 12px; border-radius: 20px; 
            font-size: 0.7rem; font-weight: 800; border: 1px solid rgba(39, 174, 96, 0.1);
        }

        .hero-title { font-size: 2rem; font-weight: 800; line-height: 1.2; margin: 0 0 15px 0; color: var(--dark); letter-spacing: -1px; }

        .hero-summary {
            font-size: 1rem; 
            color: var(--grey);
            line-height: 1.6;
            margin: 0 0 25px 0;
        }

        .btn-album {
            align-self: flex-start; background: var(--dark); color: white; 
            padding: 14px 25px; border-radius: 14px; text-decoration: none; 
            font-weight: 800; font-size: 0.8rem; transition: 0.3s;
        }
        .btn-album:hover { transform: translateY(-3px); background: #000; }

        /* COLONNE DROITE (IMAGE 4/3) */
        .hero-image-side {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3; /* FORCE LE RATIO 4/3 */
            overflow: hidden;
            background: #eee;
        }

        .hero-image-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* L'image remplit l'espace sans se déformer */
        }

        /* BADGE DATE SUR L'IMAGE */
        .date-badge {
            position: absolute; top: 20px; right: 20px; background: white;
            border-radius: 15px; width: 55px; text-align: center; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 5;
        }
        .m-bg { background: var(--primary); color: white; font-size: 0.6rem; font-weight: 800; padding: 4px 0; text-transform: uppercase; }
        .d-num { font-size: 1.2rem; font-weight: 800; padding: 5px 0; color: var(--dark); }

        /* NAVIGATION SLIDER */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; border-radius: 50%; background: var(--dark);
            border: none; color: white; cursor: pointer; z-index: 100;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--primary); transform: translateY(-50%) scale(1.1); }
        .prev { left: -25px; } .next { right: -25px; }

        /* SECTION ACTUS (FOND BLANC) */
        .news-section { padding: 80px 0; background: var(--white); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }

        .actus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .actu-card { 
            background: var(--bg-page); border-radius: 30px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: 0.3s;
        }
        .actu-img { width: 100%; height: 220px; object-fit: cover; }
        .actu-body { padding: 25px; }
        .actu-desc { font-size: 0.95rem; color: var(--grey); line-height: 1.6; margin-bottom: 15px; }

        @media (max-width: 992px) {
            .slide { grid-template-columns: 1fr; }
            .hero-info-side { order: 2; padding: 30px; }
            .hero-image-side { order: 1; }
            .nav-btn { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="nav-links">
            <a href="index.html" style="color: var(--primary);">ACCUEIL</a>
            <a href="archives.html">ARCHIVES</a>
            <a href="equipe.html">L'ÉQUIPE</a>
        </div>
        <a href="index.html" class="logo">Randocool</a>
        <div class="nav-actions">
            <a href="#" class="btn-add-main">+ ACTUALITÉ</a>
        </div>
    </div>
</header>

<section class="hero-section">
    <div class="hero-container">
        <button class="nav-btn prev" onclick="moveSlide(-1)">←</button>
        <button class="nav-btn next" onclick="moveSlide(1)">→</button>
        
        <div class="slider-wrapper">
            <div id="slider-root" class="slider-container"></div>
        </div>
    </div>
</section>

<section class="news-section">
    <div class="container">
        <h2 class="section-title">Fil d'actualité</h2>
        <div id="actus-root" class="actus-grid"></div>
    </div>
</section>

<script>
    const SUPABASE_URL = 'https://mdpzwevznroqkpnobbag.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcHp3ZXZ6bnJvcWtwbm9iYmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3OTM1MjEsImV4cCI6MjA4NDM2OTUyMX0.ISXEl1Lf-jKMW1BUKnu02wcjs1veZ9Os9kmJcJCmwG4';
    
    // Initialisation sans stockage pour éviter les blocages de tracking
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: false }
    });

    let currentIdx = 0;

    async function init() {
        const { data: randos } = await supabaseClient.from('randos').select('*').order('date', { ascending: false }).limit(5);
        if (randos) renderHero(randos);

        const { data: actus } = await supabaseClient.from('actus').select('*').order('created_at', { ascending: false });
        if (actus) renderActus(actus);
    }

    function renderHero(items) {
        document.getElementById('slider-root').innerHTML = items.map((r, i) => {
            const d = new Date(r.date);
            return `
            <div class="slide ${i === 0 ? 'active' : ''}">
                <div class="hero-info-side">
                    <div class="pill-row">
                        <span class="pill">📏 ${r.distance} KM</span>
                        <span class="pill">📈 ${r.denivele} M</span>
                        <span class="pill">👥 ${r.nombre_participants || 0} PERS.</span>
                    </div>
                    <h2 class="hero-title">${r.titre}</h2>
                    <p class="hero-summary">${r.description || 'Une sortie Randocool inoubliable.'}</p>
                    <a href="${r.album_url}" target="_blank" class="btn-album">VOIR L'ALBUM 📸</a>
                </div>
                
                <div class="hero-image-side">
                    <img src="${r.image_url}" alt="${r.titre}">
                    <div class="date-badge">
                        <div class="m-bg">${d.toLocaleDateString('fr-FR', {month:'short'})}</div>
                        <div class="d-num">${d.getDate()}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderActus(items) {
        document.getElementById('actus-root').innerHTML = items.map(a => {
            const d = new Date(a.created_at);
            return `
            <div class="actu-card">
                <div class="date-badge" style="top:15px; right:15px; width:45px; border-radius:12px;">
                    <div class="m-bg" style="font-size:0.5rem; padding:3px 0;">${d.toLocaleDateString('fr-FR', {month:'short'})}</div>
                    <div class="d-num" style="font-size:1rem; padding:4px 0;">${d.getDate()}</div>
                </div>
                ${a.photo_url ? `<img src="${a.photo_url}" class="actu-img">` : ''}
                <div class="actu-body">
                    <p class="actu-desc">${a.description}</p>
                    ${a.lien ? `<a href="${a.lien}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none; font-size:0.8rem;">LIEN SOURCE →</a>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function moveSlide(dir) {
        const slides = document.querySelectorAll('.slide');
        if(!slides.length) return;
        slides[currentIdx].classList.remove('active');
        currentIdx = (currentIdx + dir + slides.length) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    init();
</script>
</body>
</html>
