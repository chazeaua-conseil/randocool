<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randocool | L'aventure au sommet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60; --dark: #0f172a; --grey: #64748b;
            --light-bg: #f8fafc; --white: #ffffff; --border: #e2e8f0;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--white); color: var(--dark); margin: 0; padding-top: 80px; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-container {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            padding: 0 40px; height: 80px; width: 100%; box-sizing: border-box;
        }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; }
        .logo { font-weight: 800; font-size: 1.8rem; letter-spacing: -1.5px; text-decoration: none; color: var(--dark); text-align: center; }
        .nav-actions { display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
        .btn-add-main { background: var(--dark); color: white !important; padding: 10px 20px; border-radius: 12px; font-size: 0.8rem !important; font-weight: 700; text-decoration: none; }

        /* SECTION HERO AVEC LARGEUR CONTENUE */
        .hero-section { 
            max-width: 1100px; 
            margin: 30px auto; 
            padding: 0 20px;
            position: relative; 
        }

        .slider-wrapper {
            position: relative;
            height: 550px;
            border-radius: 40px;
            overflow: hidden;
            background: #eee;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .slider-container { height: 100%; position: relative; }
        
        .slide {
            position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out;
            background-size: cover; background-position: center;
        }
        .slide.active { opacity: 1; z-index: 1; }

        /* TITRE ET DATE SUR L'IMAGE */
        .hero-title-top {
            position: absolute; top: 30px; left: 40px; color: white;
            font-size: 3rem; font-weight: 800; margin: 0; letter-spacing: -1.5px; z-index: 5;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .date-badge-mini {
            position: absolute; top: 30px; right: 40px; background: white;
            border-radius: 15px; width: 60px; text-align: center; overflow: hidden; z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .m-bg { background: var(--primary); color: white; font-size: 0.6rem; font-weight: 800; padding: 4px 0; }
        .d-num { font-size: 1.2rem; font-weight: 800; padding: 5px 0; color: var(--dark); }

        /* LA BANDE D'INFO EN BAS */
        .hero-card {
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            padding: 25px 40px; 
            z-index: 6;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .hero-text-content { flex: 1; }
        .hero-summary {
            font-size: 0.9rem; color: var(--grey); line-height: 1.5; margin: 8px 0 0 0;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .pill-row { display: flex; gap: 10px; }
        .pill { background: white; color: var(--dark); padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: 800; border: 1px solid var(--border); }

        .btn-album {
            background: var(--dark); color: white; padding: 14px 25px; border-radius: 14px; 
            text-decoration: none; font-weight: 800; font-size: 0.8rem; white-space: nowrap; 
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-album:hover { transform: translateY(-2px); background: #000; }

        /* BOUTONS DE NAVIGATION DU SLIDER */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px; border-radius: 50%; background: white;
            border: none; color: var(--dark); cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .nav-btn:hover { background: var(--primary); color: white; }
        .prev { left: -22px; }
        .next { right: -22px; }

        /* ACTUS SECTION */
        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        .section-header { margin-bottom: 30px; }
        .section-title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin: 5px 0; }

        .actus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .actu-card { background: var(--light-bg); border-radius: 30px; overflow: hidden; border: 1px solid var(--border); }
        .actu-img { width: 100%; height: 220px; object-fit: cover; }
        .actu-body { padding: 25px; }
        .actu-desc { font-size: 0.9rem; color: var(--grey); line-height: 1.6; margin-bottom: 15px; }
        .actu-btn { color: var(--primary); text-decoration: none; font-weight: 800; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .hero-title-top { font-size: 2rem; left: 20px; top: 20px; }
            .hero-card { flex-direction: column; align-items: flex-start; padding: 20px; gap: 15px; }
            .btn-album { width: 100%; text-align: center; box-sizing: border-box; }
            .slider-wrapper { height: 500px; }
            .prev, .next { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="nav-links">
            <a href="index.html" style="color: var(--primary);">ACCUEIL</a>
            <a href="archives.html">ARCHIVES</a>
            <a href="equipe.html">L'ÉQUIPE</a>
        </div>
        <a href="index.html" class="logo">Randocool</a>
        <div class="nav-actions">
            <a href="#" class="btn-add-main" onclick="openActuModal()">+ ACTUALITÉ</a>
        </div>
    </div>
</header>

<section class="hero-section">
    <button class="nav-btn prev" onclick="moveSlide(-1)">←</button>
    <button class="nav-btn next" onclick="moveSlide(1)">→</button>
    
    <div class="slider-wrapper">
        <div id="slider-root" class="slider-container">
            </div>
    </div>
</section>

<div class="container">
    <div class="section-header">
        <span style="color:var(--primary); font-weight:800; font-size:0.75rem; text-transform:uppercase; letter-spacing:2px;">Communauté</span>
        <h2 class="section-title">Le fil d'actus</h2>
    </div>
    <div id="actus-root" class="actus-grid">
        </div>
</div>

<script>
    const SUPABASE_URL = 'https://mdpzwevznroqkpnobbag.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcHp3ZXZ6bnJvcWtwbm9iYmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3OTM1MjEsImV4cCI6MjA4NDM2OTUyMX0.ISXEl1Lf-jKMW1BUKnu02wcjs1veZ9Os9kmJcJCmwG4';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentIdx = 0;

    async function init() {
        // Charger les randos pour le Hero
        const { data: randos } = await supabaseClient.from('randos').select('*').order('date', { ascending: false }).limit(5);
        if (randos) renderHero(randos);

        // Charger les actus
        const { data: actus } = await supabaseClient.from('actus').select('*').order('created_at', { ascending: false });
        if (actus) renderActus(actus);
    }

    function renderHero(items) {
        document.getElementById('slider-root').innerHTML = items.map((r, i) => {
            const d = new Date(r.date);
            return `
            <div class="slide ${i === 0 ? 'active' : ''}" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.1)), url('${r.image_url}')">
                <h2 class="hero-title-top">${r.titre}</h2>
                <div class="date-badge-mini">
                    <div class="m-bg">${d.toLocaleDateString('fr-FR', {month:'short'}).toUpperCase()}</div>
                    <div class="d-num">${d.getDate()}</div>
                </div>
                
                <div class="hero-card">
                    <div class="hero-text-content">
                        <div class="pill-row">
                            <span class="pill">📏 ${r.distance} KM</span>
                            <span class="pill">📈 ${r.denivele} M</span>
                            <span class="pill">👥 ${r.nombre_participants || 0} PERS.</span>
                        </div>
                        <p class="hero-summary">${r.description || 'Redécouvrez les sentiers avec nous.'}</p>
                    </div>
                    
                    <div class="hero-actions">
                        <a href="${r.album_url}" target="_blank" class="btn-album">ALBUM PHOTOS 📸</a>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderActus(items) {
        document.getElementById('actus-root').innerHTML = items.map(a => `
            <div class="actu-card">
                ${a.photo_url ? `<img src="${a.photo_url}" class="actu-img">` : ''}
                <div class="actu-body">
                    <p class="actu-desc">${a.description}</p>
                    ${a.lien ? `<a href="${a.lien}" target="_blank" class="actu-btn">LIRE LA SUITE →</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    function moveSlide(dir) {
        const slides = document.querySelectorAll('.slide');
        if(!slides.length) return;
        slides[currentIdx].classList.remove('active');
        currentIdx = (currentIdx + dir + slides.length) % slides.length;
        slides[currentIdx].classList.add('active');
    }

    init();
</script>
</body>
</html>
