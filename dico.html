    <style>
        :root {

        header { text-align: center; padding: 40px 20px; background: #27ae60; color: white; }
        .search-container { max-width: 500px; margin: -20px auto 30px; padding: 0 20px; }
        #search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); outline: none; }
        .dico-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .dico-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .dico-card:hover { transform: translateY(-5px); }
        .dico-image { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .dico-content { padding: 15px; }
        .dico-title { margin: 0 0 8px 0; color: var(--dark-color); font-size: 1.2rem; }
        .dico-detail { color: #666; font-style: italic; font-size: 0.9rem; margin: 0; }
    </style>
